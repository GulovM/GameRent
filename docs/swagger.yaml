openapi: 3.0.0
info:
  title: GameRent API
  version: 1.0.0
  description: >
    REST API specification for the GameRent platform. Supports game account rentals,
    user trust level management, reviews, notifications, admin operations, and payment webhooks.
servers:
  - url: /api/v1
    description: Production API Server (v1)
paths:
  /auth/register:
    post:
      summary: Register a new user
      description: Creates a new user profile and returns access and refresh tokens.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponseWrapped'
        '409':
          description: User already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Login user
      description: Authenticates user credentials and returns tokens.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseWrapped'
        '401':
          description: Unauthorized - Invalid email or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Logout user
      description: Logs out the user by revoking the refresh token.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logged out successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad request - Invalid or already revoked token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      summary: Refresh tokens
      description: Generates a new access token and refresh token rotation using a valid refresh token.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponseWrapped'
        '401':
          description: Unauthorized - Expired or already revoked refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      summary: Get current user
      description: Retrieves profile details of the currently authenticated user.
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseWrapped'
        '401':
          description: Unauthorized - Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User profile not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}:
    get:
      summary: Get user profile
      description: Retrieves details of a specific user.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User profile retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseWrapped'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update user profile
      description: Updates editable details (first name, last name) of a user.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User profile updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseWrapped'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Cannot modify other users' profiles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/rentals:
    get:
      summary: Get current user rentals
      description: Retrieves rentals corresponding to the authenticated user.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Rentals retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRentalsResponseWrapped'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/payments:
    get:
      summary: Get current user payments
      description: Retrieves payments history corresponding to the authenticated user.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Payments retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaymentsResponseWrapped'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/notifications:
    get:
      summary: Get current user notifications
      description: Retrieves notifications list corresponding to the authenticated user.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Notifications retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotificationsResponseWrapped'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts:
    get:
      summary: List available game accounts (catalog)
      description: Retrieves a paginated list of available accounts, supports search, filtering, and sorting.
      tags:
        - Accounts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: status
          in: query
          schema:
            type: string
        - name: game
          in: query
          schema:
            type: string
        - name: min_price
          in: query
          schema:
            type: integer
        - name: max_price
          in: query
          schema:
            type: integer
        - name: trust_level
          in: query
          schema:
            type: string
            enum: [Bronze, Silver, Gold, Diamond]
      responses:
        '200':
          description: Accounts retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAccountsResponseWrapped'

  /accounts/{accountId}:
    get:
      summary: Get game account by ID
      description: Retrieves detailed information about a specific game account.
      tags:
        - Accounts
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Account details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponseWrapped'
        '400':
          description: Invalid ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/{accountId}/availability:
    get:
      summary: Get account availability
      description: Checks whether a specific game account is currently available for rent.
      tags:
        - Accounts
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Availability check completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAvailabilityResponseWrapped'
        '400':
          description: Invalid ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/{id}/favorite:
    post:
      summary: Add account to favorites
      description: Adds a game account to the user's favorites list.
      tags:
        - Accounts
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Added to favorites.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remove account from favorites
      description: Removes a game account from the user's favorites list.
      tags:
        - Accounts
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Removed from favorites.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games:
    get:
      summary: List games
      description: Retrieves a list of all games present in the catalog.
      tags:
        - Games
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Games catalog retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResponseWrapped'

  /games/{gameId}:
    get:
      summary: Get game details
      description: Retrieves information about a single game by its ID.
      tags:
        - Games
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Game details retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponseWrapped'
        '400':
          description: Invalid ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rentals:
    post:
      summary: Create a rental
      description: Books a game account for renting and calculates costs.
      tags:
        - Rentals
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRentalRequest'
      responses:
        '201':
          description: Rental created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalResponseWrapped'
        '400':
          description: Invalid rental duration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden due to insufficient trust level.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - Account already rented or unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List rentals
      description: Retrieves a list of rentals, filtered by status.
      tags:
        - Rentals
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [Created, WaitingPayment, Active, Expired, Completed, Cancelled]
      responses:
        '200':
          description: Rentals list retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRentalsResponseWrapped'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rentals/{rentalId}:
    get:
      summary: Get rental by ID
      description: Retrieves details of a specific rental.
      tags:
        - Rentals
      security:
        - bearerAuth: []
      parameters:
        - name: rentalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Rental details retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalResponseWrapped'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Rental not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rentals/{rentalId}/cancel:
    post:
      summary: Cancel a rental
      description: Cancels a rental in the "WaitingPayment" or "Created" state.
      tags:
        - Rentals
      security:
        - bearerAuth: []
      parameters:
        - name: rentalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Rental cancelled successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalResponseWrapped'
        '400':
          description: Cannot cancel rental in current state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rentals/calculate:
    post:
      summary: Calculate rental cost
      description: Estimates hourly, deposit, and total costs for a hypothetical rental duration.
      tags:
        - Rentals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateRentalRequest'
      responses:
        '200':
          description: Rental cost calculation details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculateRentalResponseWrapped'
        '400':
          description: Invalid request parameter values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rentals/{id}/extend:
    post:
      summary: Extend rental period
      description: Extends the expiration date of an active rental if the account is not reserved by others.
      tags:
        - Rentals
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtendRentalRequest'
      responses:
        '200':
          description: Rental period extended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalResponseWrapped'
        '400':
          description: Invalid extension duration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot extend because the account has been reserved or is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payments:
    post:
      summary: Create payment
      description: Initiates a payment process for a pending rental reservation.
      tags:
        - Payments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Payment transaction initiated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponseWrapped'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - Payment failed to initiate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List payments
      description: Retrieves a history of payment transactions.
      tags:
        - Payments
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Payments list retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaymentsResponseWrapped'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payments/{paymentId}:
    get:
      summary: Get payment by ID
      description: Retrieves details of a specific payment transaction.
      tags:
        - Payments
      security:
        - bearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment details retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponseWrapped'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Payment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payments/webhook:
    post:
      summary: Payment Webhook
      description: Processes secure notifications from external payment providers.
      tags:
        - Payments
      parameters:
        - name: X-Payment-Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC SHA-256 signature validating webhook authenticity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookRequest'
      responses:
        '200':
          description: Webhook processed successfully. Returns game credentials if payment was success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResponseWrapped'
        '400':
          description: Invalid request body or payload formats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Webhook signature verification failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal webhook processor error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reviews:
    post:
      summary: Submit a review
      description: Allows a user to leave a review and rating for a rental experience.
      tags:
        - Reviews
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review submitted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponseWrapped'
        '400':
          description: Invalid review details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/{accountId}/reviews:
    get:
      summary: Get account reviews
      description: Retrieves a paginated list of reviews left for a specific account.
      tags:
        - Reviews
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Account reviews list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReviewsResponseWrapped'
        '404':
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications:
    get:
      summary: List notifications
      description: Retrieves a list of user system notifications.
      tags:
        - Notifications
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: unread_only
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Notifications list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotificationsResponseWrapped'
        '401':
