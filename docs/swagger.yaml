components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Envelope schemas
    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          example: {}

    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: The input parameters are invalid.

    # Wrapped DTO Response schemas
    RegisterResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/RegisterResponse'

    LoginResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/LoginResponse'

    RefreshResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/RefreshResponse'

    UserResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/UserResponse'

    PaginatedAccountsResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/PaginatedAccountsResponse'

    AccountResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/AccountResponse'

    AccountAvailabilityResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/AccountAvailabilityResponse'

    CatalogResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/CatalogResponse'

    GameResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/GameResponse'

    RentalResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/RentalResponse'

    PaginatedRentalsResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/PaginatedRentalsResponse'

    CalculateRentalResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/CalculateRentalResponse'

    PaymentResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/PaymentResponse'

    PaginatedPaymentsResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/PaginatedPaymentsResponse'

    WebhookResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/WebhookResponse'

    ReviewResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/ReviewResponse'

    PaginatedReviewsResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/PaginatedReviewsResponse'

    PaginatedNotificationsResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/PaginatedNotificationsResponse'

    NotificationResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/NotificationResponse'

    PaginatedUsersResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/PaginatedUsersResponse'

    PaginatedAuditLogsResponseWrapped:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/PaginatedAuditLogsResponse'

    # Core DTO schemas
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: secretPass123!

    RegisterResponse:
      type: object
      required:
        - user
        - access_token
        - refresh_token
      properties:
        user:
          $ref: '#/components/schemas/UserResponse'
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          example: 8a4c28fe-bc57-4146-a496-e17f4d45d8b7

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: secretPass123!

    LoginResponse:
      type: object
      required:
        - access_token
        - refresh_token
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          example: 8a4c28fe-bc57-4146-a496-e17f4d45d8b7

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: 8a4c28fe-bc57-4146-a496-e17f4d45d8b7

    RefreshResponse:
      type: object
      required:
        - access_token
        - refresh_token
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          example: 8a4c28fe-bc57-4146-a496-e17f4d45d8b7

    UserResponse:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        trust_score:
          type: integer
          example: 300
        trust_level:
          type: string
          enum: [Bronze, Silver, Gold, Diamond]
          example: Silver
        is_blocked:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: 2026-07-05T11:52:55Z
        updated_at:
          type: string
          format: date-time
          example: 2026-07-05T11:52:55Z

    UpdateUserRequest:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 50
          example: John
        last_name:
          type: string
          maxLength: 50
          example: Doe

    MoneyResponse:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: integer
          format: int64
          description: Price in lowest currency unit (e.g. cents)
          example: 150
        currency:
          type: string
          example: USD

    AccountGameResponse:
      type: object
      required:
        - game_id
        - name
        - steam_app_id
        - playtime_minutes
      properties:
        game_id:
          type: integer
          format: int64
          example: 5
        name:
          type: string
          example: Counter-Strike 2
        steam_app_id:
          type: integer
          example: 730
        playtime_minutes:
          type: integer
          example: 1045

    AccountResponse:
      type: object
      required:
        - id
        - steam_id64
        - status
        - price_per_hour
        - security_deposit
        - games
      properties:
        id:
          type: integer
          format: int64
          example: 12
        steam_id64:
          type: string
          example: "76561198000000000"
        status:
          type: string
          enum: [Created, Verifying, Available, Reserved, Rented, Maintenance, Disabled]
          example: Available
        price_per_hour:
          $ref: '#/components/schemas/MoneyResponse'
        security_deposit:
          $ref: '#/components/schemas/MoneyResponse'
        games:
          type: array
          items:
            $ref: '#/components/schemas/AccountGameResponse'

    PaginationInfo:
      type: object
      required:
        - page
        - page_size
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20
        total_items:
          type: integer
          format: int64
          example: 15
        total_pages:
          type: integer
          example: 1

    PaginatedAccountsResponse:
      type: object
      required:
        - accounts
        - pagination
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    AccountAvailabilityResponse:
      type: object
      required:
        - account_id
        - available
      properties:
        account_id:
          type: integer
          format: int64
          example: 12
        available:
          type: boolean
          example: true

    GameResponse:
      type: object
      required:
        - id
        - steam_app_id
        - name
        - header_image
      properties:
        id:
          type: integer
          format: int64
          example: 5
        steam_app_id:
          type: integer
          example: 730
        name:
          type: string
          example: Counter-Strike 2
        header_image:
          type: string
          example: https://cdn.akamai.steamstatic.com/steam/apps/730/header.jpg

    CatalogResponse:
      type: object
      required:
        - games
        - pagination
      properties:
        games:
          type: array
          items:
            $ref: '#/components/schemas/GameResponse'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    CreateRentalRequest:
      type: object
      required:
        - account_id
        - duration_hours
      properties:
        account_id:
          type: integer
          format: int64
          example: 12
        duration_hours:
          type: integer
          minimum: 1
          maximum: 720
          example: 6

    RentalResponse:
      type: object
      required:
        - id
        - account
        - user
        - started_at
        - expires_at
        - status
        - total_price
      properties:
        id:
          type: integer
          format: int64
          example: 45
        account:
          $ref: '#/components/schemas/AccountResponse'
        user:
          $ref: '#/components/schemas/UserResponse'
        started_at:
          type: string
          format: date-time
          example: 2026-07-05T12:00:00Z
        expires_at:
          type: string
          format: date-time
          example: 2026-07-05T18:00:00Z
        status:
          type: string
          enum: [Created, WaitingPayment, Active, Expired, Completed, Cancelled]
          example: WaitingPayment
        total_price:
          $ref: '#/components/schemas/MoneyResponse'

    PaginatedRentalsResponse:
      type: object
      required:
        - rentals
        - pagination
      properties:
        rentals:
          type: array
          items:
            $ref: '#/components/schemas/RentalResponse'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    CalculateRentalRequest:
      type: object
      required:
        - account_id
        - duration_hours
      properties:
        account_id:
          type: integer
          format: int64
          example: 12
        duration_hours:
          type: integer
          example: 6

    CalculateRentalResponse:
      type: object
      required:
        - price_per_hour
        - security_deposit
        - duration_hours
        - total_price
      properties:
        price_per_hour:
          $ref: '#/components/schemas/MoneyResponse'
        security_deposit:
          $ref: '#/components/schemas/MoneyResponse'
        duration_hours:
          type: integer
          example: 6
        total_price:
          $ref: '#/components/schemas/MoneyResponse'

    ExtendRentalRequest:
      type: object
      required:
        - duration_hours
      properties:
        duration_hours:
          type: integer
          example: 3

    CreatePaymentRequest:
      type: object
      required:
        - rental_id
      properties:
        rental_id:
          type: integer
          format: int64
          example: 45

    PaymentResponse:
      type: object
      required:
        - id
        - amount
        - currency
        - status
      properties:
        id:
          type: integer
          format: int64
          example: 88
        amount:
          type: integer
          format: int64
          example: 900
        currency:
          type: string
          example: USD
        status:
          type: string
          enum: [Created, Waiting, Completed, Failed]
          example: Waiting
        payment_url:
          type: string
          example: https://payment-gateway.example.com/checkout/88

    PaginatedPaymentsResponse:
      type: object
      required:
        - payments
        - pagination
      properties:
        payments:
          type: array
          items:
            $ref: '#/components/schemas/PaymentResponse'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    WebhookRequest:
      type: object
      required:
        - payment_id
        - rental_id
        - external_transaction_id
        - status
      properties:
        payment_id:
          type: string
          example: "88"
        rental_id:
          type: string
          example: "45"
        external_transaction_id:
          type: string
          example: tx_99887766
        status:
          type: string
          enum: [success, failed]
          example: success

    CredentialsPayload:
      type: object
      required:
        - login
        - password
        - steam_id64
      properties:
        login:
          type: string
          example: steam_user_123
        password:
          type: string
          example: DecryptedSteamPassword!
        steam_id64:
          type: string
          example: "76561198000000000"

    WebhookResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Payment processed successfully.
        credentials:
          $ref: '#/components/schemas/CredentialsPayload'

    CreateReviewRequest:
      type: object
      required:
        - account_id
